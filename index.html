<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <title>小红书AI分析</title>
  <style>
    body {
      background: #f7f7f8;
      font-family: sans-serif;
      display: flex;
      justify-content: center;
      padding: 40px;
    }

    .card {
      width: 600px;
      background: #fff;
      padding: 20px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 10px;
      padding: 10px;
      border: 1px solid #ddd;
    }

    button {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      border-radius: 10px;
      background: black;
      color: white;
      cursor: pointer;
    }

    .result {
      margin-top: 20px;
      white-space: pre-wrap;
    }
  </style>
</head>

<body>
  <div class="card">
    <h2>小红书AI分析工具</h2>
    <textarea id="text"></textarea>
    <button onclick="analyze()">开始分析</button>
    <div id="result" class="result"></div>
  </div>

  <script>
    async function analyze() {
      const text = document.getElementById("text").value;
      const resultDiv = document.getElementById("result");

      resultDiv.innerText = "分析中...";

      const res = await fetch("/api/analyze", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ text })
      });

      const data = await res.json();

      resultDiv.innerText = data.result || data.error;
    }
  </script>
</body>
</html>
